<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老王翻译一致性测试器</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.2em;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #f9f9f9;
        }
        
        .test-section h3 {
            color: #444;
            margin-bottom: 15px;
        }
        
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        select, button {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: white;
            border-left: 5px solid #667eea;
        }
        
        .consistency-score {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .score-excellent { background: #d4edda; color: #155724; }
        .score-good { background: #fff3cd; color: #856404; }
        .score-poor { background: #f8d7da; color: #721c24; }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .comparison-item {
            padding: 15px;
            border-radius: 8px;
            background: #f0f0f0;
        }
        
        .comparison-item h4 {
            margin-top: 0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 老王翻译一致性测试器</h1>
        <p class="subtitle">艹！测试一下老王优化后的翻译一致性，看看来回翻译是不是一样了！</p>
        
        <div class="test-section">
            <h3>📝 输入测试文本</h3>
            <textarea id="testText" placeholder="输入你要测试的文本，老王会帮你检查翻译一致性..."></textarea>
            
            <div class="controls">
                <select id="sourceLanguage">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
                
                <select id="targetLanguage">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
                
                <select id="model">
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="deepseek-chat">DeepSeek Chat</option>
                </select>
                
                <select id="station">
                    <option value="primary">主要中转站</option>
                    <option value="backup">备用中转站</option>
                    <option value="third">第三中转站</option>
                </select>
            </div>
            
            <button id="testButton" onclick="runConsistencyTest()">🚀 开始一致性测试</button>
        </div>
        
        <div id="results" style="display: none;">
            <div class="test-section">
                <h3>📊 测试结果</h3>
                <div id="consistencyScore"></div>
                
                <div class="comparison">
                    <div class="comparison-item">
                        <h4>🔄 第一次翻译</h4>
                        <div id="firstTranslation"></div>
                    </div>
                    <div class="comparison-item">
                        <h4>🔄 往返翻译</h4>
                        <div id="backTranslation"></div>
                    </div>
                </div>
                
                <div class="comparison">
                    <div class="comparison-item">
                        <h4>📝 原始文本</h4>
                        <div id="originalText"></div>
                    </div>
                    <div class="comparison-item">
                        <h4>🎯 最终结果</h4>
                        <div id="finalResult"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            老王正在测试翻译一致性，请稍候...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        async function runConsistencyTest() {
            const text = document.getElementById('testText').value.trim();
            const sourceLang = document.getElementById('sourceLanguage').value;
            const targetLang = document.getElementById('targetLanguage').value;
            const model = document.getElementById('model').value;
            const station = document.getElementById('station').value;
            
            if (!text) {
                showError('老王说：你tm倒是输入点文本啊！');
                return;
            }
            
            if (sourceLang === targetLang) {
                showError('老王说：源语言和目标语言不能一样，你这不是搞笑吗？');
                return;
            }
            
            showLoading(true);
            hideError();
            hideResults();
            
            try {
                // 第一次翻译
                const firstResult = await translate(text, sourceLang, targetLang, model, station, true);
                
                if (!firstResult.success) {
                    throw new Error(firstResult.error || '翻译失败');
                }
                
                // 显示结果
                showResults(text, firstResult);
                
            } catch (error) {
                console.error('测试失败:', error);
                showError(`老王测试失败了：${error.message}`);
            } finally {
                showLoading(false);
            }
        }
        
        async function translate(text, sourceLang, targetLang, model, station, roundTripCheck = false) {
            const response = await fetch('/api/translate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: text,
                    source_language: sourceLang,
                    target_language: targetLang,
                    model: model,
                    station: station,
                    round_trip_check: roundTripCheck
                })
            });
            
            return await response.json();
        }
        
        function showResults(originalText, result) {
            document.getElementById('originalText').textContent = originalText;
            document.getElementById('firstTranslation').textContent = result.translated_text;
            
            if (result.round_trip_check) {
                const score = result.round_trip_check.consistency_score;
                document.getElementById('backTranslation').textContent = result.round_trip_check.back_translation;
                document.getElementById('finalResult').textContent = result.round_trip_check.original_text;
                
                const scoreElement = document.getElementById('consistencyScore');
                scoreElement.textContent = `一致性评分: ${score}%`;
                
                if (score >= 80) {
                    scoreElement.className = 'consistency-score score-excellent';
                    scoreElement.textContent += ' - 老王说：艹！这翻译一致性不错！';
                } else if (score >= 60) {
                    scoreElement.className = 'consistency-score score-good';
                    scoreElement.textContent += ' - 老王说：还行吧，凑合能用';
                } else {
                    scoreElement.className = 'consistency-score score-poor';
                    scoreElement.textContent += ' - 老王说：这一致性有点拉胯啊';
                }
            } else {
                document.getElementById('backTranslation').textContent = '未进行往返翻译检查';
                document.getElementById('finalResult').textContent = result.translated_text;
                document.getElementById('consistencyScore').textContent = '未检查一致性';
            }
            
            document.getElementById('results').style.display = 'block';
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('testButton').disabled = show;
        }
        
        function showError(message) {
            const errorElement = document.getElementById('error');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        function hideResults() {
            document.getElementById('results').style.display = 'none';
        }
        
        // 预设一些测试文本
        const testTexts = [
            "Hello, how are you today?",
            "我今天心情很好，想出去走走。",
            "The weather is beautiful today.",
            "这个产品的质量非常好，我很满意。"
        ];
        
        // 随机填充测试文本
        document.getElementById('testText').placeholder = testTexts[Math.floor(Math.random() * testTexts.length)];
    </script>
</body>
</html>

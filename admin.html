<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI翻译器 - 管理控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #ff6b35;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin: 30px 0 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #ff6b35;
        }

        .section h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.3em;
        }

        .section p {
            color: #666;
            margin: 0;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
        }

        .btn {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn:hover {
            background: #e55a2b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .status {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .status h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-value {
            font-weight: 600;
        }

        .status-value.enabled {
            color: #28a745;
        }

        .status-value.disabled {
            color: #dc3545;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ 管理控制台</h1>
            <p>老王专用AI翻译器管理系统</p>
        </div>

        <div class="content">
            <!-- 当前状态显示 -->
            <div class="status" id="currentStatus">
                <h3>📊 当前配置状态</h3>
                <div class="loading" id="statusLoading" style="display: none;">
                    <div class="spinner"></div>
                    <p>正在加载配置状态...</p>
                </div>
                <div id="statusContent">
                    <div class="status-item">
                        <span>中转站切换</span>
                        <span class="status-value" id="stationSwitchStatus">加载中...</span>
                    </div>
                    <div class="status-item">
                        <span>AI模型切换</span>
                        <span class="status-value" id="modelSwitchStatus">加载中...</span>
                    </div>
                    <div class="status-item">
                        <span>强制指定模型</span>
                        <span class="status-value" id="forcedModelStatus">加载中...</span>
                    </div>
                    <div class="status-item">
                        <span>最后更新时间</span>
                        <span class="status-value" id="lastUpdatedStatus">加载中...</span>
                    </div>
                </div>
            </div>

            <!-- 警告/成功消息 -->
            <div class="alert" id="alertMessage"></div>

            <!-- 管理员控制表单 -->
            <div class="section">
                <h3>🔧 权限控制</h3>
                <p>控制用户可以访问和切换的中转站和AI模型</p>
            </div>

            <form id="adminForm">
                <div class="form-group">
                    <label for="adminPassword">管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="allowStationSwitch">
                    <label for="allowStationSwitch">允许用户切换中转站</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="allowModelSwitch">
                    <label for="allowModelSwitch">允许用户切换AI模型</label>
                </div>

                <div class="form-group">
                    <label for="forcedModel">强制指定模型（留空表示不强制）</label>
                    <select id="forcedModel">
                        <option value="">不强制指定模型</option>
                        <option value="gpt-4.1">GPT-4.1 ⭐ (推荐翻译)</option>
                        <option value="claude-3-5-sonnet">Claude 3.5 Sonnet ⭐ (性价比)</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                        <option value="deepseek-ai/DeepSeek-V3.1">DeepSeek V3.1</option>
                        <option value="gpt-5">GPT-5</option>
                        <option value="o3">O3</option>
                        <option value="claude-3-7-sonnet">Claude 3.7 Sonnet</option>
                        <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="GLM-4.5">GLM-4.5</option>
                        <option value="grok-3-latest">Grok 3</option>
                        <option value="grok-4-latest">Grok 4</option>
                        <option value="moonshotai/Kimi-K2-Instruct">Kimi K2</option>
                    </select>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn">💾 保存配置</button>
                    <button type="button" class="btn btn-secondary" id="refreshBtn">🔄 刷新状态</button>
                </div>
            </form>
        </div>

        <div class="footer">
            <p>© 2025 老王AI翻译器管理系统 | 密码默认: laowang123</p>
        </div>
    </div>

    <script>
        class AdminPanel {
            constructor() {
                this.init();
            }

            async init() {
                // 绑定事件
                document.getElementById('adminForm').addEventListener('submit', (e) => this.handleSubmit(e));
                document.getElementById('refreshBtn').addEventListener('click', () => this.loadStatus());

                // 加载当前状态
                await this.loadStatus();
            }

            async loadStatus() {
                console.log('🔄 开始加载管理员配置状态...');

                try {
                    const response = await fetch('/api/admin?action=status');
                    const data = await response.json();

                    console.log('📡 API响应:', data);

                    if (data.success && data.config) {
                        this.updateStatusDisplay(data.config);
                        this.updateFormValues(data.config);
                        console.log('✅ 配置状态加载成功');
                    } else {
                        console.warn('⚠️ 获取配置状态失败:', data);
                        this.showAlert('获取配置状态失败', 'error');
                    }
                } catch (error) {
                    console.error('❌ 加载状态失败:', error);
                    this.showAlert('连接服务器失败，使用默认配置', 'warning');

                    // 使用默认配置
                    const defaultConfig = {
                        allowStationSwitch: true,
                        allowModelSwitch: true,
                        forcedModel: '',
                        lastUpdated: new Date().toISOString()
                    };
                    this.updateStatusDisplay(defaultConfig);
                    this.updateFormValues(defaultConfig);
                }
            }

            updateStatusDisplay(config) {
                document.getElementById('stationSwitchStatus').textContent = config.allowStationSwitch ? '允许' : '禁止';
                document.getElementById('stationSwitchStatus').className = `status-value ${config.allowStationSwitch ? 'enabled' : 'disabled'}`;

                document.getElementById('modelSwitchStatus').textContent = config.allowModelSwitch ? '允许' : '禁止';
                document.getElementById('modelSwitchStatus').className = `status-value ${config.allowModelSwitch ? 'enabled' : 'disabled'}`;

                document.getElementById('forcedModelStatus').textContent = config.forcedModel || '未强制';
                document.getElementById('forcedModelStatus').className = `status-value ${config.forcedModel ? 'disabled' : 'enabled'}`;

                document.getElementById('lastUpdatedStatus').textContent = new Date(config.lastUpdated).toLocaleString('zh-CN');
            }

            updateFormValues(config) {
                document.getElementById('allowStationSwitch').checked = config.allowStationSwitch;
                document.getElementById('allowModelSwitch').checked = config.allowModelSwitch;
                document.getElementById('forcedModel').value = config.forcedModel || '';
            }

            async handleSubmit(e) {
                e.preventDefault();

                const password = document.getElementById('adminPassword').value;
                const allowStationSwitch = document.getElementById('allowStationSwitch').checked;
                const allowModelSwitch = document.getElementById('allowModelSwitch').checked;
                const forcedModel = document.getElementById('forcedModel').value;

                if (!password) {
                    this.showAlert('请输入管理员密码', 'error');
                    return;
                }

                try {
                    const response = await fetch('/api/admin', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            password: password,
                            allowStationSwitch: allowStationSwitch,
                            allowModelSwitch: allowModelSwitch,
                            forcedModel: forcedModel,
                            adminName: 'laowang'
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        this.showAlert(data.message, 'success');
                        if (data.warnings && data.warnings.length > 0) {
                            this.showAlert(data.warnings.join('<br>'), 'warning');
                        }
                        // 刷新状态显示
                        await this.loadStatus();
                        // 清空密码
                        document.getElementById('adminPassword').value = '';
                    } else {
                        this.showAlert(data.error || '保存失败', 'error');
                    }
                } catch (error) {
                    console.error('保存配置失败:', error);
                    this.showAlert('连接服务器失败', 'error');
                }
            }

            showAlert(message, type) {
                const alert = document.getElementById('alertMessage');
                alert.innerHTML = message;
                alert.className = `alert ${type}`;
                alert.style.display = 'block';

                // 3秒后自动隐藏
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 3000);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            new AdminPanel();
        });
    </script>
</body>
</html>

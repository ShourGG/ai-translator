<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试翻译API</title>
  </head>
  <body>
    <h1>翻译API测试</h1>
    <button onclick="testAPI()">测试API</button>
    <div id="result"></div>

    <script>
      async function testAPI() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '正在测试...';

        try {
          const response = await fetch(
            'https://96320933.ai-translator-97n.pages.dev/api/translate',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                text: 'Hello World',
                source_language: 'en',
                target_language: 'zh',
                station: 'primary'
              })
            }
          );

          const result = await response.json();
          console.log('API返回的完整数据:', result);

          resultDiv.innerHTML = `
                    <h3>API响应：</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    <h3>翻译结果字段：</h3>
                    <p>result.translated_text = ${result.translated_text}</p>
                    <p>typeof result.translated_text = ${typeof result.translated_text}</p>
                `;
        } catch (error) {
          resultDiv.innerHTML = `错误: ${error.message}`;
          console.error('完整错误:', error);
        }
      }
    </script>
  </body>
</html>
